    postgres:
        container_name: postgreSQL
        image: postgres:15-alpine
        ports:
            - "5433:5433"
        environment:
            - POSTGRES_DB=warranty_system
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - POSTGRES_PORT=5433
        command: postgres -p 5433
        volumes:
            - postgres_data:/var/lib/postgresql/data
        restart: unless-stopped
        networks:
            - app-network

    # Floci (Local AWS Emulator)
    floci:
        container_name: floci
        image: floci/floci:latest-compat
        ports:
            - "4566:4566"
        volumes:
            # Mount a local folder for persisting S3, SQS, etc.
            - ./floci-data:/app/data
            # Optional: Uncomment if you eventually use Lambda, ECS, etc.
            # - /var/run/docker.sock:/var/run/docker.sock
        restart: unless-stopped
        networks:
            - app-network

volumes:
    postgres_data:

networks:
    app-network:
        driver: bridge
