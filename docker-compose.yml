    postgres:
        container_name: postgreSQL
        image: postgres:15-alpine
        ports:
            - "5433:5433"
        environment:
            - POSTGRES_DB=warranty_system
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - POSTGRES_PORT=5433
        command: postgres -p 5433
        volumes:
            - postgres_data:/var/lib/postgresql/data
        restart: unless-stopped
        networks:
            - app-network

    redis:
        container_name: redis
        image: redis:7-alpine
        ports:
            - "6379:6379"
        # Tells redis-server to use the mounted ACL configuration file
        command: redis-server --appendonly yes --aclfile /etc/redis/users.acl
        volumes:
            - redis_data:/data
            - ./users.acl:/etc/redis/users.acl:ro
        restart: unless-stopped
        networks:
            - app-network

    redisinsight:
        container_name: redisinsight
        image: redis/redisinsight:latest
        ports:
            - "8001:5540"
        volumes:
            - redisinsight_data:/data
        restart: unless-stopped
        depends_on:
            - redis
        networks:
            - app-network

    pgadmin:
        container_name: pgadmin
        image: dpage/pgadmin4:latest
        ports:
            - "5050:80"
        environment:
            - PGADMIN_DEFAULT_EMAIL=admin@warranty.com
            - PGADMIN_DEFAULT_PASSWORD=admin123
            - PGADMIN_CONFIG_SERVER_MODE=False
            - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
        volumes:
            - pgadmin_data:/var/lib/pgadmin
            - ./servers.json:/pgadmin4/servers.json
        restart: unless-stopped
        depends_on:
            - postgres
        networks:
            - app-network

    floci:
        container_name: floci
        image: floci/floci:latest-compat
        ports:
            - "4566:4566"
        volumes:
            - ./floci-data:/app/data
        restart: unless-stopped
        networks:
            - app-network

volumes:
    postgres_data:
    pgadmin_data:
    redis_data:
    redisinsight_data:

networks:
    app-network:
        driver: bridge
